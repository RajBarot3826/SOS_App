name: safereach
description: SafeReach - Inclusive AI-Enabled SOS & Assistive Safety Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3

  # Location & Maps
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  google_maps_flutter: ^2.12.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Sensors
  sensors_plus: ^6.1.1

  # QR Code
  mobile_scanner: ^6.0.4

  # Speech & Voice
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0

  # Authentication
  local_auth: ^2.3.0

  # Haptics & Feedback
  vibration: ^2.0.0

  # UI & Charts
  fl_chart: ^0.70.2
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.3

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  permission_handler: ^11.4.0
  path_provider: ^2.1.5
  encrypt: ^5.0.3
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  collection: ^1.19.1
  telephony: ^0.2.0
  flutter_background_service: ^5.1.0
  home_widget: ^0.9.2
  flutter_local_notifications: ^21.0.0
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_messaging: ^16.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter
  build_runner: ^2.4.15
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/l10n/


