subprojects { project ->
    project.plugins.withId("com.android.library") {
        project.android {
            if (namespace == null) {
                def ns = project.group
                if (ns == null || ns == '' || ns == 'unspecified') {
                    ns = "com.legacy.plugin.${project.name.replaceAll('[^a-zA-Z0-9_]', '_')}"
                }
                namespace ns
            }
        }
    }
}
